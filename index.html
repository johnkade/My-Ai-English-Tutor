<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emma AI Tutor</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f8f7f4]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SYSTEM_PROMPT = `You are Emma, a friendly English tutor. Use Myanmar language sometimes to explain things if the student is struggling. Always provide feedback in JSON format at the end.`;
        const API_KEY = "မင်းရဲ့_API_KEY_ဒီမှာထည့်";

        function App() {
            const [messages, setMessages] = useState([{ role: "tutor", text: "Hi! I'm Emma. Ready to practice English? 👋" }]);
            const [input, setInput] = useState("");
            const [loading, setLoading] = useState(false);
            const bottomRef = useRef(null);

            useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

            async function sendMessage() {
                if (!input.trim() || loading) return;
                const userMsg = { role: "user", text: input };
                setMessages([...messages, userMsg]);
                setInput("");
                setLoading(true);

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: SYSTEM_PROMPT + "\nUser: " + input }] }] })
                    });
                    const data = await res.json();
                    const aiText = data.candidates[0].content.parts[0].text;
                    setMessages(prev => [...prev, { role: "tutor", text: aiText }]);
                } catch (e) {
                    setMessages(prev => [...prev, { role: "tutor", text: "Sorry, something went wrong. Check your API key!" }]);
                }
                setLoading(false);
            }

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto bg-white shadow-lg">
                    <header className="p-4 border-b flex items-center gap-3">
                        <div className="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-xl">🎓</div>
                        <div><h1 className="font-bold text-sm">Emma AI Tutor</h1><p className="text-xs text-gray-400">Online</p></div>
                    </header>
                    <div className="flex-1 overflow-y-auto p-4 space-y-4">
                        {messages.map((m, i) => (
                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[80%] p-3 rounded-2xl text-sm ${m.role === 'user' ? 'bg-blue-600 text-white rounded-br-none' : 'bg-gray-100 text-gray-800 rounded-bl-none'}`}>
                                    {m.text}
                                </div>
                            </div>
                        ))}
                        <div ref={bottomRef} />
                    </div>
                    <div className="p-4 border-t flex gap-2">
                        <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendMessage()} placeholder="Type in English..." className="flex-1 p-2 bg-gray-50 border rounded-full px-4 outline-none text-sm" />
                        <button onClick={sendMessage} className="bg-blue-600 text-white p-2 rounded-full w-10 h-10 flex items-center justify-center">➔</button>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
